services:
  - type: web
    name: medsimple-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PUBMED_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /health
